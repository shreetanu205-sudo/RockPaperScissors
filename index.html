<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="navbar"><h1>Rock Paper Scissors</h1></div>
    </header>
    <main>
        <div class="hand-section">
            <div class="stone all"><i class="fa-solid fa-hand-fist icon"></i></div>
            <div class="paper all"><i class="fa-solid fa-hand icon"></i></div>
            <div class="scissor all"><i class="fa-solid fa-hand-peace icon"></i></div>
        </div>
        <div class="score-board">
            <div class="score">
                <p id="user-score">0</p>
                <p>You</p>
            </div>
            <div class="score">
                <p id="comp-score">0</p>
                <p>Comp</p>
            </div>
        </div>
        <div class="msg-container">
            <p id="msg">    Play one move!    </p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
